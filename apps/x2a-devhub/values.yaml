# X2A Developer Hub — vanilla redhat-developer-hub chart v1.9.3
# Auth via OpenShift OAuth (OIDC provider)

global:
  clusterRouterBase: apps.ocp.new.lab.danielsson.us.com
  host: x2a.apps.ocp.new.lab.danielsson.us.com

upstream:
  postgresql:
    auth:
      existingSecret: x2a-devhub-postgresql
  backstage:
    extraEnvVars:
      - name: NODE_TLS_REJECT_UNAUTHORIZED
        value: "0"
    extraEnvVarsSecrets:
      - x2a-devhub-ocp-auth
    appConfig:
      app:
        title: "X2Ansible Developer Hub"
        baseUrl: https://x2a.apps.ocp.new.lab.danielsson.us.com
      backend:
        baseUrl: https://x2a.apps.ocp.new.lab.danielsson.us.com
      auth:
        session:
          secret: ${SESSION_SECRET}
        providers:
          oidc:
            production:
              metadataUrl: https://oauth-openshift.apps.ocp.new.lab.danielsson.us.com/.well-known/openid-configuration
              clientId: ${OCP_OAUTH_CLIENT_ID}
              clientSecret: ${OCP_OAUTH_CLIENT_SECRET}
              prompt: auto
              signIn:
                resolvers:
                  - resolver: preferredUsernameMatchingUserEntityName
                    dangerouslyAllowSignInWithoutUserInCatalog: true
      signInPage: oidc
      catalog:
        locations:
          - type: url
            target: https://github.com/x2ansible/x2a-convertor/blob/main/catalog-info.yaml
            rules:
              - allow: [Component]
          - type: url
            target: https://github.com/x2ansible/x2a-convertor/blob/main/templates/x2a-migration-template.yaml
            rules:
              - allow: [Template]
