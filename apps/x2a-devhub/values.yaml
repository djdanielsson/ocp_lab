# X2A Developer Hub — vanilla redhat-developer-hub chart v1.9.3
# Auth: Guest (OpenShift OAuth is not OIDC-compliant)

global:
  clusterRouterBase: apps.ocp.new.lab.danielsson.us.com
  host: x2a.apps.ocp.new.lab.danielsson.us.com
  dynamic:
    includes:
      - dynamic-plugins.default.yaml
    plugins:
      - package: ./dynamic-plugins/dist/roadiehq-scaffolder-backend-module-http-request-dynamic
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-plugin-kubernetes-backend-dynamic
        disabled: false
        pluginConfig:
          kubernetes:
            serviceLocatorMethod:
              type: multiTenant
            clusterLocatorMethods:
              - type: config
                clusters:
                  - name: ocp-local
                    url: https://kubernetes.default.svc
                    authProvider: serviceAccount
                    skipTLSVerify: true
                    skipMetricsLookup: true
      - package: ./dynamic-plugins/dist/backstage-plugin-kubernetes
        disabled: false
        pluginConfig:
          dynamicPlugins:
            frontend:
              backstage.plugin-kubernetes:
                mountPoints:
                  - mountPoint: entity.page.kubernetes/cards
                    importName: EntityKubernetesContent
                    config:
                      layout:
                        gridColumn: 1 / -1
                      if:
                        anyOf:
                          - hasAnnotation: backstage.io/kubernetes-id
                          - hasAnnotation: backstage.io/kubernetes-namespace
      - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-community-plugin-tekton:bs_1.45.3__3.33.3
        disabled: false
        pluginConfig:
          dynamicPlugins:
            frontend:
              backstage-community.plugin-tekton:
                mountPoints:
                  - mountPoint: entity.page.ci/cards
                    importName: TektonCI
                    config:
                      layout:
                        gridColumn: 1 / -1
                      if:
                        allOf:
                          - isTektonCIAvailable

upstream:
  postgresql:
    auth:
      existingSecret: x2a-devhub-postgresql
  backstage:
    extraEnvVars:
      - name: NODE_TLS_REJECT_UNAUTHORIZED
        value: "0"
      - name: BACKEND_SECRET
        valueFrom:
          secretKeyRef:
            key: backend-secret
            name: x2a-devhub-auth
    extraEnvVarsSecrets:
      - x2a-devhub-ocp-auth
    appConfig:
      app:
        title: "X2Ansible Developer Hub"
        baseUrl: https://x2a.apps.ocp.new.lab.danielsson.us.com
      backend:
        baseUrl: https://x2a.apps.ocp.new.lab.danielsson.us.com
      proxy:
        endpoints:
          /x2a-trigger:
            target: http://el-x2a-migration.x2a-devhub.svc.cluster.local:8080
            changeOrigin: true
            credentials: dangerously-allow-unauthenticated
            allowedMethods: ['POST']
      auth:
        environment: development
        session:
          secret: ${SESSION_SECRET}
        providers:
          guest:
            dangerouslyAllowOutsideDevelopment: true
      signInPage: guest
      catalog:
        locations:
          - type: url
            target: https://github.com/djdanielsson/x2a-devhub-config/blob/main/catalog-info.yaml
            rules:
              - allow: [Component]
          - type: url
            target: https://github.com/djdanielsson/x2a-devhub-config/blob/main/templates/x2a-migration-template.yaml
            rules:
              - allow: [Template]
