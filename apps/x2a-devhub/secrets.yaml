---
# OpenShift OAuth credentials + session secret for RHDH OIDC auth.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: x2a-devhub-ocp-auth
  namespace: x2a-devhub
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: bitwarden-fields
    kind: ClusterSecretStore
  target:
    name: x2a-devhub-ocp-auth
    deletionPolicy: Delete
    template:
      type: Opaque
      data:
        OCP_OAUTH_CLIENT_ID: "{{ .clientid }}"
        OCP_OAUTH_CLIENT_SECRET: "{{ .clientsecret }}"
        SESSION_SECRET: "{{ .sessionsecret }}"
  data:
    - secretKey: clientid
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: ocp-lab/x2a-devhub
        property: ocp-oauth-client-id
    - secretKey: clientsecret
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: ocp-lab/x2a-devhub
        property: ocp-oauth-client-secret
    - secretKey: sessionsecret
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: ocp-lab/x2a-devhub
        property: session-secret
---
# PostgreSQL credentials for the embedded RHDH database.
# The chart expects a secret named after the release: x2a-devhub-postgresql
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: x2a-devhub-postgresql-creds
  namespace: x2a-devhub
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: bitwarden-fields
    kind: ClusterSecretStore
  target:
    name: x2a-devhub-postgresql
    deletionPolicy: Delete
    template:
      type: Opaque
      data:
        password: "{{ .pgpassword }}"
        postgres-password: "{{ .pgpassword }}"
  data:
    - secretKey: pgpassword
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: ocp-lab/x2a-devhub
        property: pg-password
---
# OCI plugin registry auth — required for dynamic plugin loading.
# Syncs registry.redhat.io creds from the cluster pull secret.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pull-secret-sync
  namespace: x2a-devhub
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: x2a-devhub-pull-secret-reader
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["pull-secret"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: x2a-devhub-pull-secret-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: x2a-devhub-pull-secret-reader
subjects:
  - kind: ServiceAccount
    name: pull-secret-sync
    namespace: x2a-devhub
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pull-secret-sync-writer
  namespace: x2a-devhub
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["x2a-devhub-dynamic-plugins-registry-auth"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pull-secret-sync-writer
  namespace: x2a-devhub
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: pull-secret-sync-writer
subjects:
  - kind: ServiceAccount
    name: pull-secret-sync
    namespace: x2a-devhub
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: pull-secret-sync
  namespace: x2a-devhub
spec:
  schedule: "0 */6 * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: pull-secret-sync
          restartPolicy: OnFailure
          containers:
            - name: sync
              image: registry.redhat.io/openshift4/ose-cli:latest
              command:
                - /bin/bash
                - -c
                - |
                  set -euo pipefail
                  DOCKERCFG=$(oc get secret pull-secret -n openshift-config -o jsonpath='{.data.\.dockerconfigjson}' | base64 -d)
                  AUTH_JSON=$(echo "$DOCKERCFG" | python3 -c '
                  import sys, json
                  cfg = json.load(sys.stdin)
                  out = {"auths": {}}
                  for reg in ["registry.redhat.io", "registry.connect.redhat.com"]:
                      if reg in cfg.get("auths", {}):
                          out["auths"][reg] = cfg["auths"][reg]
                  json.dump(out, sys.stdout)
                  ')
                  oc apply -f - <<EOF
                  apiVersion: v1
                  kind: Secret
                  metadata:
                    name: x2a-devhub-dynamic-plugins-registry-auth
                    namespace: x2a-devhub
                  type: Opaque
                  stringData:
                    auth.json: '$AUTH_JSON'
                  EOF
                  echo "Synced registry auth from cluster pull-secret"
