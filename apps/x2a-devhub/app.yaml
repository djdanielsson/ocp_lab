---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: x2a-sa
  namespace: x2a-devhub
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: x2a-role
  namespace: x2a-devhub
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "get", "delete", "put"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "get", "delete", "put"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: x2a-rolebinding
  namespace: x2a-devhub
subjects:
  - kind: ServiceAccount
    name: x2a-sa
roleRef:
  kind: Role
  name: x2a-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: x2a-cluster-role
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: x2a-cluster-rolebinding
subjects:
  - kind: ServiceAccount
    name: x2a-sa
    namespace: x2a-devhub
roleRef:
  kind: ClusterRole
  name: x2a-cluster-role
  apiGroup: rbac.authorization.k8s.io
---
kind: ConfigMap
apiVersion: v1
metadata:
  name: dynamic-plugins
  namespace: x2a-devhub
data:
  dynamic-plugins.yaml: |
    includes:
      - dynamic-plugins.default.yaml
    plugins:
      # X2A DCR (RHDH 1.9 only)
      - package: "oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/red-hat-developer-hub-backstage-plugin-x2a-dcr:bs_1.49.4__0.2.0"

      # MCP actions backend (patched for RHDH 1.9 compat)
      - package: "oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-plugin-mcp-actions-backend:pr_2236__0.1.11"

      # X2A plugins
      - package: "oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/red-hat-developer-hub-backstage-plugin-x2a:bs_1.49.4__1.2.1"
      - package: "oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/red-hat-developer-hub-backstage-plugin-x2a-backend:bs_1.49.4__1.4.0"
      - package: "oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/red-hat-developer-hub-backstage-plugin-x2a-mcp-extras:bs_1.49.4__0.2.0"
      - package: "oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/red-hat-developer-hub-backstage-plugin-scaffolder-backend-module-x2a:bs_1.49.4__0.3.1"

      # GitHub scaffolder module (disabled by default, enable for GitHub integration)
      - package: './dynamic-plugins/dist/backstage-plugin-scaffolder-backend-module-github-dynamic'
        disabled: false
---
kind: ConfigMap
apiVersion: v1
metadata:
  name: app-config-rhdh
  namespace: x2a-devhub
data:
  app-config-rhdh.yaml: |

    app:
      title: "X2Ansible Developer Hub"
      baseUrl: https://x2a.apps.ocp.new.lab.danielsson.us.com

    backend:
      baseUrl: https://x2a.apps.ocp.new.lab.danielsson.us.com
      cors:
        origin:
          - http://localhost:6274
        credentials: true
      actions:
        pluginSources:
          - 'x2a-mcp-extras'
      reading:
        allow:
          - host: raw.githubusercontent.com

    mcpActions:
      namespacedToolNames: false

    integrations:
      github:
      - host: github.com

    auth:
      experimentalDynamicClientRegistration:
        enabled: true
        allowedRedirectUriPatterns:
          - cursor://*
          - https://*
          - http://*
      environment: development
      providers:
        guest:
          dangerouslyAllowOutsideDevelopment: true

    signInPage: guest

    dynamicPlugins:
      frontend:
        red-hat-developer-hub.backstage-plugin-x2a-dcr:
          dynamicRoutes:
            - path: /oauth2/*
              importName: DcrConsentPage

        red-hat-developer-hub.backstage-plugin-x2a:
          scaffolderFieldExtensions:
            - importName: RepoAuthenticationExtension
            - importName: RulesAcceptanceExtension
          appIcons:
            - name: x2aIcon
              importName: X2AIcon
          dynamicRoutes:
            - path: /x2a/
              importName: X2APage
              menuItem:
                text: Conversion Hub
                icon: x2aIcon

    catalog:
      locations:
        - type: file
          target: /opt/app-root/src/dynamic-plugins-root/red-hat-developer-hub-backstage-plugin-scaffolder-backend-module-x2a/templates/conversion-project-template.yaml
          rules:
            - allow: [Template]

    x2a:
      callbackBaseUrl: http://${SERVICE_NAME}.${NAMESPACE}.svc.cluster.local/api/x2a
      kubernetes:
        image: ${X2A_KUBERNETES_IMAGE:-quay.io/x2ansible/x2a-convertor}
        imageTag: ${X2A_KUBERNETES_IMAGE_TAG:-latest}
        ttlSecondsAfterFinished: 86400
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 2000m
            memory: 4Gi
      credentials:
        llm:
          LLM_MODEL: ${LLM_MODEL:-openai/qwen3:14b}
          OPENAI_API_BASE: ${OPENAI_API_BASE:-http://ollama.ollama.svc.cluster.local:11434/v1}
          OPENAI_API_KEY: ${OPENAI_API_KEY:-not-needed}
          MAX_TOKENS: ${MAX_TOKENS:-16384}
---
kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: dynamic-plugins-root
  namespace: x2a-devhub
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: rhdh.redhat.com/v1alpha4
kind: Backstage
metadata:
  name: developer-hub
  namespace: x2a-devhub
spec:
  deployment:
    patch:
      spec:
        template:
          spec:
            serviceAccountName: x2a-sa
            automountServiceAccountToken: true
            containers:
              - name: backstage-backend
                env:
                  - name: NODE_TLS_REJECT_UNAUTHORIZED
                    value: "0"
                  - name: NODE_EXTRA_CA_CERTS
                    value: "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
                  - name: NAMESPACE
                    valueFrom:
                      fieldRef:
                        fieldPath: metadata.namespace
                  - name: SERVICE_NAME
                    valueFrom:
                      fieldRef:
                        fieldPath: metadata.labels['rhdh.redhat.com/app']
  application:
    dynamicPluginsConfigMapName: dynamic-plugins
    appConfig:
      mountPath: /opt/app-root/src
      configMaps:
        - name: app-config-rhdh
    extraFiles:
      mountPath: /opt/app-root/src
    extraEnvs:
      secrets:
        - name: x2a-credentials
    route:
      enabled: true
