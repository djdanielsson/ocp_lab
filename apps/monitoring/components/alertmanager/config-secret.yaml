---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: alertmanager-config
  namespace: monitoring
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: bitwarden-fields
    kind: ClusterSecretStore
  target:
    name: alertmanager-config
    deletionPolicy: Delete
    template:
      type: Opaque
      data:
        alertmanager.yaml: |
          global:
            resolve_timeout: 5m
          route:
            group_by: ['alertname', 'namespace']
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 4h
            receiver: telegram
            routes:
              - receiver: telegram
                matchers:
                  - severity =~ "critical|warning"
                continue: true
          receivers:
            - name: telegram
              telegram_configs:
                - bot_token: "{{ .bot_token }}"
                  chat_id: {{ .chat_id }}
                  api_url: https://api.telegram.org
                  parse_mode: HTML
                  message: |-
                    {{ "{{" }} range .Alerts {{ "}}" }}
                    <b>{{ "{{" }} .Status | toUpper {{ "}}" }}: {{ "{{" }} .Labels.alertname {{ "}}" }}</b>
                    Severity: {{ "{{" }} .Labels.severity {{ "}}" }}
                    Namespace: {{ "{{" }} .Labels.namespace {{ "}}" }}
                    {{ "{{" }} if .Annotations.summary {{ "}}" }}Summary: {{ "{{" }} .Annotations.summary {{ "}}" }}{{ "{{" }} end {{ "}}" }}
                    {{ "{{" }} if .Annotations.description {{ "}}" }}Description: {{ "{{" }} .Annotations.description {{ "}}" }}{{ "{{" }} end {{ "}}" }}
                    {{ "{{" }} end {{ "}}" }}
          inhibit_rules:
            - source_matchers:
                - severity = critical
              target_matchers:
                - severity = warning
              equal: ['alertname', 'namespace']
  data:
    - secretKey: bot_token
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: ocp-lab/telegram-alertmanager
        property: bot_token
    - secretKey: chat_id
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: ocp-lab/telegram-alertmanager
        property: chat_id
