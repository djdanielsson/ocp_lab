---
kind: GrafanaDashboard
apiVersion: grafana.integreatly.org/v1beta1
metadata:
  name: truenas-dashboard
  labels:
    app: grafana
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  json: >
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": { "type": "grafana", "uid": "-- Grafana --" },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "description": "TrueNAS monitoring via Netdata metrics - CPU, RAM, ZFS, Disk, Network, Temperatures",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 200,
          "panels": [],
          "title": "System Overview",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [
                { "color": "green", "value": null },
                { "color": "yellow", "value": 60 },
                { "color": "red", "value": 85 }
              ]},
              "unit": "percent", "min": 0, "max": 100
            }, "overrides": []
          },
          "gridPos": { "h": 5, "w": 4, "x": 0, "y": 1 },
          "id": 1,
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto", "showThresholdLabels": false, "showThresholdMarkers": true
          },
          "title": "CPU Usage",
          "type": "gauge",
          "targets": [{ "expr": "100 - netdata_system_cpu_percentage_average{chart=\"system.cpu\",dimension=\"idle\",job=\"external-truenas-netdata\"}", "legendFormat": "CPU", "refId": "A" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [
                { "color": "green", "value": null },
                { "color": "yellow", "value": 70 },
                { "color": "red", "value": 90 }
              ]},
              "unit": "percent", "min": 0, "max": 100
            }, "overrides": []
          },
          "gridPos": { "h": 5, "w": 4, "x": 4, "y": 1 },
          "id": 2,
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto", "showThresholdLabels": false, "showThresholdMarkers": true
          },
          "title": "RAM Usage",
          "type": "gauge",
          "targets": [{ "expr": "100 * (1 - netdata_system_ram_MiB_average{chart=\"system.ram\",dimension=\"free\",job=\"external-truenas-netdata\"} / (netdata_system_ram_MiB_average{chart=\"system.ram\",dimension=\"used\",job=\"external-truenas-netdata\"} + netdata_system_ram_MiB_average{chart=\"system.ram\",dimension=\"free\",job=\"external-truenas-netdata\"} + netdata_system_ram_MiB_average{chart=\"system.ram\",dimension=\"cached\",job=\"external-truenas-netdata\"} + netdata_system_ram_MiB_average{chart=\"system.ram\",dimension=\"buffers\",job=\"external-truenas-netdata\"}))", "legendFormat": "RAM", "refId": "A" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] },
              "unit": "short", "decimals": 2
            }, "overrides": []
          },
          "gridPos": { "h": 5, "w": 4, "x": 8, "y": 1 },
          "id": 3,
          "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "colorMode": "value", "graphMode": "area", "justifyMode": "auto", "textMode": "auto" },
          "title": "Load Average",
          "type": "stat",
          "targets": [
            { "expr": "netdata_system_load_load_average{chart=\"system.load\",dimension=\"load1\",job=\"external-truenas-netdata\"}", "legendFormat": "1m", "refId": "A" },
            { "expr": "netdata_system_load_load_average{chart=\"system.load\",dimension=\"load5\",job=\"external-truenas-netdata\"}", "legendFormat": "5m", "refId": "B" },
            { "expr": "netdata_system_load_load_average{chart=\"system.load\",dimension=\"load15\",job=\"external-truenas-netdata\"}", "legendFormat": "15m", "refId": "C" }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] },
              "unit": "s"
            }, "overrides": []
          },
          "gridPos": { "h": 5, "w": 4, "x": 12, "y": 1 },
          "id": 4,
          "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "colorMode": "value", "graphMode": "none", "justifyMode": "auto", "textMode": "auto" },
          "title": "Uptime",
          "type": "stat",
          "targets": [{ "expr": "netdata_system_uptime_seconds_average{chart=\"system.uptime\",job=\"external-truenas-netdata\"}", "legendFormat": "Uptime", "refId": "A" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] },
              "unit": "short", "decimals": 0
            }, "overrides": []
          },
          "gridPos": { "h": 5, "w": 4, "x": 16, "y": 1 },
          "id": 5,
          "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "colorMode": "value", "graphMode": "area", "justifyMode": "auto", "textMode": "auto" },
          "title": "Active Processes",
          "type": "stat",
          "targets": [{ "expr": "netdata_system_active_processes_processes_average{job=\"external-truenas-netdata\"}", "legendFormat": "Processes", "refId": "A" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [
                { "color": "green", "value": null },
                { "color": "yellow", "value": 70 },
                { "color": "red", "value": 90 }
              ]},
              "unit": "percent", "min": 0, "max": 100, "decimals": 1
            }, "overrides": []
          },
          "gridPos": { "h": 5, "w": 4, "x": 20, "y": 1 },
          "id": 6,
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto", "showThresholdLabels": false, "showThresholdMarkers": true
          },
          "title": "ZFS ARC Hit Rate",
          "type": "gauge",
          "targets": [{ "expr": "netdata_zfs_hits_percentage_average{chart=\"zfs.hits\",dimension=\"hits\",job=\"external-truenas-netdata\"}", "legendFormat": "Hits", "refId": "A" }]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 6 },
          "id": 201,
          "panels": [],
          "title": "CPU",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "axisBorderShow": false, "axisLabel": "%", "fillOpacity": 30, "lineWidth": 1, "stacking": { "mode": "normal" }, "drawStyle": "line", "gradientMode": "opacity", "showPoints": "never", "spanNulls": true },
              "unit": "percent", "min": 0, "max": 100
            }, "overrides": []
          },
          "gridPos": { "h": 8, "w": 16, "x": 0, "y": 7 },
          "id": 10,
          "options": { "legend": { "displayMode": "table", "placement": "right", "calcs": ["mean","max"] }, "tooltip": { "mode": "multi" } },
          "title": "CPU Usage by Type",
          "type": "timeseries",
          "targets": [{ "expr": "netdata_system_cpu_percentage_average{chart=\"system.cpu\",dimension!=\"idle\",job=\"external-truenas-netdata\"}", "legendFormat": "{{dimension}}", "refId": "A" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "axisBorderShow": false, "axisLabel": "MHz", "fillOpacity": 10, "lineWidth": 1, "drawStyle": "line", "gradientMode": "opacity", "showPoints": "never", "spanNulls": true },
              "unit": "rotmhz"
            }, "overrides": []
          },
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 7 },
          "id": 11,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "title": "CPU Frequency",
          "type": "timeseries",
          "targets": [{ "expr": "netdata_cpufreq_cpufreq_MHz_average{job=\"external-truenas-netdata\"}", "legendFormat": "{{dimension}}", "refId": "A" }]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 15 },
          "id": 202,
          "panels": [],
          "title": "Memory",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "axisBorderShow": false, "axisLabel": "MiB", "fillOpacity": 30, "lineWidth": 1, "stacking": { "mode": "normal" }, "drawStyle": "line", "gradientMode": "opacity", "showPoints": "never", "spanNulls": true },
              "unit": "decmbytes"
            }, "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "id": 20,
          "options": { "legend": { "displayMode": "table", "placement": "right", "calcs": ["mean","max"] }, "tooltip": { "mode": "multi" } },
          "title": "RAM Usage",
          "type": "timeseries",
          "targets": [{ "expr": "netdata_system_ram_MiB_average{chart=\"system.ram\",job=\"external-truenas-netdata\"}", "legendFormat": "{{dimension}}", "refId": "A" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "axisBorderShow": false, "axisLabel": "MiB", "fillOpacity": 20, "lineWidth": 1, "drawStyle": "line", "gradientMode": "opacity", "showPoints": "never", "spanNulls": true },
              "unit": "decmbytes"
            }, "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "id": 21,
          "options": { "legend": { "displayMode": "table", "placement": "right", "calcs": ["mean","max"] }, "tooltip": { "mode": "multi" } },
          "title": "Committed & Available Memory",
          "type": "timeseries",
          "targets": [
            { "expr": "netdata_mem_available_MiB_average{job=\"external-truenas-netdata\"}", "legendFormat": "Available {{dimension}}", "refId": "A" },
            { "expr": "netdata_mem_committed_MiB_average{job=\"external-truenas-netdata\"}", "legendFormat": "Committed {{dimension}}", "refId": "B" }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 24 },
          "id": 203,
          "panels": [],
          "title": "ZFS",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "axisBorderShow": false, "axisLabel": "MiB", "fillOpacity": 20, "lineWidth": 2, "drawStyle": "line", "gradientMode": "opacity", "showPoints": "never", "spanNulls": true },
              "unit": "decmbytes"
            }, "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 25 },
          "id": 30,
          "options": { "legend": { "displayMode": "table", "placement": "right", "calcs": ["lastNotNull","mean"] }, "tooltip": { "mode": "multi" } },
          "title": "ZFS ARC Size",
          "type": "timeseries",
          "targets": [{ "expr": "netdata_zfs_arc_size_MiB_average{chart=\"zfs.arc_size\",job=\"external-truenas-netdata\"}", "legendFormat": "{{dimension}}", "refId": "A" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "axisBorderShow": false, "axisLabel": "%", "fillOpacity": 20, "lineWidth": 2, "drawStyle": "line", "gradientMode": "opacity", "showPoints": "never", "spanNulls": true },
              "unit": "percent", "min": 0, "max": 100
            }, "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 25 },
          "id": 31,
          "options": { "legend": { "displayMode": "table", "placement": "right", "calcs": ["lastNotNull","mean"] }, "tooltip": { "mode": "multi" } },
          "title": "ZFS Cache Hit Rates",
          "type": "timeseries",
          "targets": [
            { "expr": "netdata_zfs_hits_percentage_average{chart=\"zfs.hits\",job=\"external-truenas-netdata\"}", "legendFormat": "ARC {{dimension}}", "refId": "A" },
            { "expr": "netdata_zfs_dhits_percentage_average{job=\"external-truenas-netdata\"}", "legendFormat": "Data {{dimension}}", "refId": "B" },
            { "expr": "netdata_zfs_phits_percentage_average{job=\"external-truenas-netdata\"}", "legendFormat": "Prefetch {{dimension}}", "refId": "C" }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "axisBorderShow": false, "axisLabel": "reads/s", "fillOpacity": 20, "lineWidth": 1, "drawStyle": "line", "gradientMode": "opacity", "showPoints": "never", "spanNulls": true },
              "unit": "ops"
            }, "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 33 },
          "id": 32,
          "options": { "legend": { "displayMode": "table", "placement": "right", "calcs": ["mean","max"] }, "tooltip": { "mode": "multi" } },
          "title": "ZFS Reads",
          "type": "timeseries",
          "targets": [{ "expr": "netdata_zfs_reads_reads_persec_average{job=\"external-truenas-netdata\"}", "legendFormat": "{{dimension}}", "refId": "A" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "axisBorderShow": false, "axisLabel": "ops/s", "fillOpacity": 20, "lineWidth": 1, "drawStyle": "line", "gradientMode": "opacity", "showPoints": "never", "spanNulls": true },
              "unit": "ops"
            }, "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 33 },
          "id": 33,
          "options": { "legend": { "displayMode": "table", "placement": "right", "calcs": ["mean","max"] }, "tooltip": { "mode": "multi" } },
          "title": "ZFS Important Ops",
          "type": "timeseries",
          "targets": [{ "expr": "netdata_zfs_important_ops_operations_persec_average{job=\"external-truenas-netdata\"}", "legendFormat": "{{dimension}}", "refId": "A" }]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 41 },
          "id": 204,
          "panels": [],
          "title": "Disk I/O",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "axisBorderShow": false, "axisLabel": "KiB/s", "fillOpacity": 20, "lineWidth": 1, "drawStyle": "line", "gradientMode": "opacity", "showPoints": "never", "spanNulls": true },
              "unit": "KiBs"
            }, "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 42 },
          "id": 40,
          "options": { "legend": { "displayMode": "table", "placement": "right", "calcs": ["mean","max"] }, "tooltip": { "mode": "multi" } },
          "title": "System Disk I/O",
          "type": "timeseries",
          "targets": [{ "expr": "netdata_system_io_KiB_persec_average{chart=\"system.io\",job=\"external-truenas-netdata\"}", "legendFormat": "{{dimension}}", "refId": "A" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "axisBorderShow": false, "axisLabel": "ops/s", "fillOpacity": 20, "lineWidth": 1, "drawStyle": "line", "gradientMode": "opacity", "showPoints": "never", "spanNulls": true },
              "unit": "ops"
            }, "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 42 },
          "id": 41,
          "options": { "legend": { "displayMode": "table", "placement": "right", "calcs": ["mean","max"] }, "tooltip": { "mode": "multi" } },
          "title": "Disk IOPS per Device",
          "type": "timeseries",
          "targets": [{ "expr": "netdata_disk_ops_operations_persec_average{job=\"external-truenas-netdata\"}", "legendFormat": "{{device}} {{dimension}}", "refId": "A" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "axisBorderShow": false, "axisLabel": "KiB/s", "fillOpacity": 20, "lineWidth": 1, "drawStyle": "line", "gradientMode": "opacity", "showPoints": "never", "spanNulls": true },
              "unit": "KiBs"
            }, "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 50 },
          "id": 42,
          "options": { "legend": { "displayMode": "table", "placement": "right", "calcs": ["mean","max"] }, "tooltip": { "mode": "multi" } },
          "title": "Per-Disk I/O Throughput",
          "type": "timeseries",
          "targets": [{ "expr": "netdata_disk_io_KiB_persec_average{job=\"external-truenas-netdata\"}", "legendFormat": "{{device}} {{dimension}} ({{model}})", "refId": "A" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "axisBorderShow": false, "axisLabel": "%", "fillOpacity": 20, "lineWidth": 1, "drawStyle": "line", "gradientMode": "opacity", "showPoints": "never", "spanNulls": true },
              "unit": "percent"
            }, "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 50 },
          "id": 43,
          "options": { "legend": { "displayMode": "table", "placement": "right", "calcs": ["mean","max"] }, "tooltip": { "mode": "multi" } },
          "title": "Disk Utilization",
          "type": "timeseries",
          "targets": [{ "expr": "netdata_disk_util___of_time_working_average{job=\"external-truenas-netdata\"}", "legendFormat": "{{device}}", "refId": "A" }]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 58 },
          "id": 205,
          "panels": [],
          "title": "Disk Space",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "axisBorderShow": false, "axisLabel": "GiB", "fillOpacity": 30, "lineWidth": 1, "stacking": { "mode": "normal" }, "drawStyle": "bars", "gradientMode": "opacity", "showPoints": "never", "spanNulls": true },
              "unit": "decgbytes"
            }, "overrides": []
          },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 59 },
          "id": 50,
          "options": { "legend": { "displayMode": "table", "placement": "right", "calcs": ["lastNotNull"] }, "tooltip": { "mode": "multi" } },
          "title": "Disk Space Usage (by mount)",
          "type": "timeseries",
          "targets": [{ "expr": "netdata_disk_space_GiB_average{job=\"external-truenas-netdata\",mount_point=\"/\"}", "legendFormat": "/ {{dimension}}", "refId": "A" }]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 67 },
          "id": 206,
          "panels": [],
          "title": "Network",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "axisBorderShow": false, "axisLabel": "kilobits/s", "fillOpacity": 20, "lineWidth": 1, "drawStyle": "line", "gradientMode": "opacity", "showPoints": "never", "spanNulls": true },
              "unit": "Kbits"
            }, "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 68 },
          "id": 60,
          "options": { "legend": { "displayMode": "table", "placement": "right", "calcs": ["mean","max"] }, "tooltip": { "mode": "multi" } },
          "title": "Total Network Traffic",
          "type": "timeseries",
          "targets": [{ "expr": "netdata_system_net_kilobits_persec_average{chart=\"system.net\",job=\"external-truenas-netdata\"}", "legendFormat": "{{dimension}}", "refId": "A" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "axisBorderShow": false, "axisLabel": "kilobits/s", "fillOpacity": 20, "lineWidth": 1, "drawStyle": "line", "gradientMode": "opacity", "showPoints": "never", "spanNulls": true },
              "unit": "Kbits"
            }, "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 68 },
          "id": 61,
          "options": { "legend": { "displayMode": "table", "placement": "right", "calcs": ["mean","max"] }, "tooltip": { "mode": "multi" } },
          "title": "Per-Interface Traffic (Physical)",
          "type": "timeseries",
          "targets": [{ "expr": "netdata_net_net_kilobits_persec_average{job=\"external-truenas-netdata\",interface_type=\"real\"}", "legendFormat": "{{device}} {{dimension}}", "refId": "A" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "axisBorderShow": false, "axisLabel": "drops/s", "fillOpacity": 20, "lineWidth": 1, "drawStyle": "line", "gradientMode": "opacity", "showPoints": "never", "spanNulls": true },
              "unit": "short"
