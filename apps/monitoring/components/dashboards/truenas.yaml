              "expr": "100 * (1 - netdata_system_ram_MiB_average{chart=\"system.ram\",dimension=\"free\",job=\"external-truenas-netdata\"} / scalar(sum(netdata_system_ram_MiB_average{chart=\"system.ram\",job=\"external-truenas-netdata\"})))",
