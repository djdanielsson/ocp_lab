---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: x2a-devhub-tekton
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/djdanielsson/x2a-devhub-config.git
    path: tekton/
    targetRevision: main
  destination:
    namespace: x2a-devhub
    server: https://kubernetes.default.svc
  ignoreDifferences:
    - group: tekton.dev
      kind: Pipeline
      jsonPointers:
        - /spec/tasks
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
