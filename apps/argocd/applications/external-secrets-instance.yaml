---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-instance
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  destination:
    namespace: openshift-external-secrets-operator
    server: https://kubernetes.default.svc
  project: default
  source:
    repoURL: https://github.com/djdanielsson/ocp_lab.git
    path: apps/external-secrets/instances/
    targetRevision: vault
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
