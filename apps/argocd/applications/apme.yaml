---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: apme
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  sources:
    - repoURL: https://github.com/djdanielsson/ocp_lab.git
      targetRevision: new
      ref: values
    - repoURL: https://github.com/djdanielsson/ocp_lab.git
      targetRevision: new
      path: apps/apme/chart
      helm:
        valueFiles:
          - $values/apps/apme/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: apme
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
