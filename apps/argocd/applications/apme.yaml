---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: apme
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/djdanielsson/ocp_lab.git
    targetRevision: apme
    path: apps/apme/chart
    helm:
      releaseName: apme
      apiVersions:
        - route.openshift.io/v1
      valueFiles:
        - ../values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: apme
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
