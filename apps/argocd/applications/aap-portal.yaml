---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aap-portal
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  destination:
    namespace: aap-portal
    server: https://kubernetes.default.svc
  project: default
  source:
    repoURL: https://charts.openshift.io
    chart: redhat-rhaap-portal
    targetRevision: "2.1.0"
    helm:
      releaseName: redhat-rhaap-portal
      values: |
        redhat-developer-hub:
          global:
            clusterRouterBase: apps.ocp.new.lab.danielsson.us.com
            pluginMode: oci
            imageTagInfo: "2.1"
          upstream:
            backstage:
              appConfig:
                app:
                  title: "AAP Self-Service Portal"
                  baseUrl: https://redhat-rhaap-portal-aap-portal.apps.ocp.new.lab.danielsson.us.com
                backend:
                  baseUrl: https://redhat-rhaap-portal-aap-portal.apps.ocp.new.lab.danielsson.us.com
                ansible:
                  rhaap:
                    checkSSL: false
                auth:
                  providers:
                    rhaap:
                      production:
                        checkSSL: false
                catalog:
                  providers:
                    rhaap:
                      '{{- include "catalog.providers.env" . }}':
                        orgs: "Default"
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: redhat-rhaap-portal-postgresql
      jsonPointers:
        - /data/password
        - /data/postgres-password
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
