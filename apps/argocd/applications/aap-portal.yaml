---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aap-portal
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  destination:
    namespace: aap-portal
    server: https://kubernetes.default.svc
  project: default
  source:
    repoURL: https://charts.openshift.io
    chart: redhat-rhaap-portal
    targetRevision: "*"
    helm:
      values: |
        redhat-developer-hub:
          global:
            clusterRouterBase: apps.ocp.new.lab.danielsson.us.com
            pluginMode: oci
          upstream:
            backstage:
              appConfig:
                app:
                  title: "AAP Self-Service Portal"
                  baseUrl: https://aap-portal.apps.ocp.new.lab.danielsson.us.com
                backend:
                  baseUrl: https://aap-portal.apps.ocp.new.lab.danielsson.us.com
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
