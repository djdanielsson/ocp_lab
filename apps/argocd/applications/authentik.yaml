---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authentik
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  destination:
    namespace: authentik
    server: https://kubernetes.default.svc
  project: default
  source:
    repoURL: https://charts.goauthentik.io
    chart: authentik
    targetRevision: "2026.2.1"
    helm:
      valuesObject:
        authentik:
          secret_key: ""
          existingSecret:
            secretName: authentik-credentials
          postgresql:
            host: authentik-postgresql
            name: authentik
            user: authentik
            password: ""
          error_reporting:
            enabled: false
        global:
          env:
            - name: AUTHENTIK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: authentik-credentials
                  key: AUTHENTIK_SECRET_KEY
            - name: AUTHENTIK_BOOTSTRAP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: authentik-credentials
                  key: AUTHENTIK_BOOTSTRAP_PASSWORD
            - name: AUTHENTIK_BOOTSTRAP_EMAIL
              value: "admin@danielsson.us.com"
        postgresql:
          enabled: true
          auth:
            username: authentik
            database: authentik
            existingSecret: authentik-postgres-credentials
            secretKeys:
              userPasswordKey: POSTGRES_PASSWORD
          primary:
            persistence:
              storageClass: lvms-lvm-local-storage
              size: 8Gi
        redis:
          enabled: true
        server:
          replicas: 1
          ingress:
            enabled: false
          metrics:
            enabled: true
            serviceMonitor:
              enabled: false
        worker:
          replicas: 1
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
    retry:
      limit: 10
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
