apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: privatebin
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://privatebin.github.io/helm-chart
    chart: privatebin
    targetRevision: 0.23.3
    helm:
      values: |
        ingress:
          enabled: true
          hosts:
            - host: privatebin.apps.ocp.new.lab.danielsson.us.com
              paths:
                - path: /
                  pathType: ImplementationSpecific
        
        # Scrub all hardcoded Pod-level Alpine UIDs/GIDs
        podSecurityContext:
          fsGroup: null
          runAsUser: null
          runAsGroup: null
          seccompProfile:
            type: RuntimeDefault

        # Scrub Container-level UIDs and enforce OCP strict standards
        securityContext:
          runAsUser: null
          runAsGroup: null
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          
  destination:
    server: https://kubernetes.default.svc
    namespace: privatebin
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true