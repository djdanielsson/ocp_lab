---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: x2a-devhub
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  destination:
    namespace: x2a-devhub
    server: https://kubernetes.default.svc
  project: default
  source:
    repoURL: https://github.com/djdanielsson/ocp_lab.git
    path: apps/x2a-devhub/
    targetRevision: main
    directory:
      exclude: "operator.yaml"
  ignoreDifferences:
    - kind: Secret
      jsonPointers:
        - /data
        - /stringData
    - group: rhdh.redhat.com
      kind: Backstage
      jsonPointers:
        - /spec/deployment
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
