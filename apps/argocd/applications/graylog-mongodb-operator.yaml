---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: graylog-mongodb-operator
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  destination:
    namespace: operators
    server: https://kubernetes.default.svc
  project: default
  source:
    repoURL: https://mongodb.github.io/helm-charts
    chart: mongodb-kubernetes
    targetRevision: "1.6.1"
    helm:
      parameters:
        - name: operator.watchNamespace
          value: "*"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
