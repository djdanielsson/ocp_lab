# Values required for `ct install` in test.yaml workflow
redhat-developer-hub:
  global:
    clusterRouterBase: apps.testing.com
    imagePullSecrets: [rh-registry-auth]
    _environment:
      _development: true
      _production: false
    host: rhdh.127.0.0.1.sslip.io
  route:
    enabled: false
  test:
    enabled: true 
    image:
      registry: quay.io
      repository: curl/curl-base
      tag: 8.11.1
  testImageCredentials:
    registry: quay.io
    username: "default"
    password: "default"
  registryCredentials:
    registry: registry.redhat.io
    username: "default"
    password: "default"
  upstream:
    ingress:
      enabled: true
    postgresql:
      image:
        registry: quay.io
        repository: fedora/postgresql-15
        tag: latest
      primary:
        persistence:
          enabled: false
    backstage:
      image:
        pullSecrets: [rh-registry-auth]
      # All extraEnvVars from values.yaml must be duplicated here due to Helm
      # override behavior - see https://issues.redhat.com/browse/RHIDP-6082
      extraEnvVars:
        - name: BACKEND_SECRET
          valueFrom:
            secretKeyRef:
              key: backend-secret
              name: '{{ include "janus-idp.backend-secret-name" $ }}'
        - name: POSTGRESQL_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              key: postgres-password
              name: '{{- include "janus-idp.postgresql.secretName" . }}'
        - name: ENABLE_AUTH_PROVIDER_MODULE_OVERRIDE
          value: 'true'
        # Disable analytics for CI/CD builds to avoid false positives in Amplitude
        - name: SEGMENT_WRITE_KEY
          value: ''
        - name: AAP_HOST_URL
          valueFrom:
            secretKeyRef:
              key: aap-host-url
              name: secrets-rhaap-portal
        - name: OAUTH_CLIENT_ID
          valueFrom:
            secretKeyRef:
              key: oauth-client-id
              name: secrets-rhaap-portal
        - name: OAUTH_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              key: oauth-client-secret
              name: secrets-rhaap-portal
        - name: AAP_TOKEN
          valueFrom:
            secretKeyRef:
              key: aap-token
              name: secrets-rhaap-portal
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              key: github-token
              name: secrets-scm
              optional: true
        - name: GITLAB_TOKEN
          valueFrom:
            secretKeyRef:
              key: gitlab-token
              name: secrets-scm
              optional: true
      appConfig:
        ansible:
          rhaap:
            baseUrl: "https://testUrl"
            token: "testToken"
        auth:
          providers:
            rhaap:
              production:
                host: "https://testUrl"
                clientID: "testClientId"
                clientSecret: "testClientSecret"
