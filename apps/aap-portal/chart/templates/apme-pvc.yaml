{{- if .Values.apme.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-apme-gateway-data
  labels:
    app.kubernetes.io/name: apme
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: gateway
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.apme.persistence.gatewayData.size | default "1Gi" }}
  {{- if .Values.apme.persistence.storageClass }}
  storageClassName: {{ .Values.apme.persistence.storageClass }}
  {{- end }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-apme-sessions
  labels:
    app.kubernetes.io/name: apme
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: sessions
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.apme.persistence.sessions.size | default "5Gi" }}
  {{- if .Values.apme.persistence.storageClass }}
  storageClassName: {{ .Values.apme.persistence.storageClass }}
  {{- end }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-apme-proxy-cache
  labels:
    app.kubernetes.io/name: apme
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: proxy-cache
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.apme.persistence.proxyCache.size | default "5Gi" }}
  {{- if .Values.apme.persistence.storageClass }}
  storageClassName: {{ .Values.apme.persistence.storageClass }}
  {{- end }}
{{- end }}
