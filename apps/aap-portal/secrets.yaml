---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: redhat-rhaap-portal-postgresql-creds
  namespace: aap-portal
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: bitwarden-fields
    kind: ClusterSecretStore
  target:
    name: redhat-rhaap-portal-postgresql-creds
    deletionPolicy: Delete
    template:
      type: Opaque
      data:
        password: "{{ .pgpassword }}"
        postgres-password: "{{ .pgpassword }}"
  data:
    - secretKey: pgpassword
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: ocp-lab/aap-portal
