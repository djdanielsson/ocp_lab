---
# AAP auth — OAuth app credentials + API token for portal ↔ AAP controller.
# These are always required: the portal uses them for user login (OAuth) and
# catalog sync (API token).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: secrets-rhaap-portal
  namespace: aap-portal
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: bitwarden-fields
    kind: ClusterSecretStore
  target:
    name: secrets-rhaap-portal
    deletionPolicy: Delete
    template:
      type: Opaque
      data:
        aap-host-url: "{{ .aaphosturl }}"
        oauth-client-id: "{{ .oauthclientid }}"
        oauth-client-secret: "{{ .oauthclientsecret }}"
        aap-token: "{{ .aaptoken }}"
  data:
    - secretKey: aaphosturl
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: ocp-lab/aap-portal
        property: aap-host-url
    - secretKey: oauthclientid
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: ocp-lab/aap-portal
        property: oauth-client-id
    - secretKey: oauthclientsecret
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: ocp-lab/aap-portal
        property: oauth-client-secret
    - secretKey: aaptoken
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: ocp-lab/aap-portal
        property: aap-token
---
# PostgreSQL credentials for the embedded database.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: redhat-rhaap-portal-postgresql-creds
  namespace: aap-portal
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: bitwarden-fields
    kind: ClusterSecretStore
  target:
    name: redhat-rhaap-portal-postgresql-creds
    deletionPolicy: Delete
    template:
      type: Opaque
      data:
        password: "{{ .pgpassword }}"
        postgres-password: "{{ .pgpassword }}"
  data:
    - secretKey: pgpassword
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: ocp-lab/aap-portal
        property: pg-password
---
# OCI plugin registry auth — required for pluginMode: oci.
# The install-dynamic-plugins init container uses skopeo to pull plugins
# from registry.redhat.io and does NOT use cluster pull secrets or
# imagePullSecrets. This dedicated secret is the only way it authenticates.
#
# Instead of maintaining separate registry creds in Bitwarden, we sync the
# registry.redhat.io entry from the cluster pull secret (openshift-config/pull-secret).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pull-secret-sync
  namespace: aap-portal
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aap-portal-pull-secret-reader
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["pull-secret"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: aap-portal-pull-secret-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: aap-portal-pull-secret-reader
subjects:
  - kind: ServiceAccount
    name: pull-secret-sync
    namespace: aap-portal
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pull-secret-sync-writer
  namespace: aap-portal
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["redhat-rhaap-portal-dynamic-plugins-registry-auth"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pull-secret-sync-writer
  namespace: aap-portal
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: pull-secret-sync-writer
subjects:
  - kind: ServiceAccount
    name: pull-secret-sync
    namespace: aap-portal
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: pull-secret-sync
  namespace: aap-portal
spec:
  schedule: "0 */6 * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: pull-secret-sync
          restartPolicy: OnFailure
          containers:
            - name: sync
              image: registry.redhat.io/openshift4/ose-cli:latest
              command:
                - /bin/bash
                - -c
                - |
                  set -euo pipefail
                  DOCKERCFG=$(oc get secret pull-secret -n openshift-config -o jsonpath='{.data.\.dockerconfigjson}' | base64 -d)
                  AUTH_JSON=$(echo "$DOCKERCFG" | python3 -c '
                  import sys, json
                  cfg = json.load(sys.stdin)
                  out = {"auths": {}}
                  for reg in ["registry.redhat.io", "registry.connect.redhat.com"]:
                      if reg in cfg.get("auths", {}):
                          out["auths"][reg] = cfg["auths"][reg]
                  json.dump(out, sys.stdout)
                  ')
                  oc apply -f - <<EOF
                  apiVersion: v1
                  kind: Secret
                  metadata:
                    name: redhat-rhaap-portal-dynamic-plugins-registry-auth
                    namespace: aap-portal
                  type: Opaque
                  stringData:
                    auth.json: '$AUTH_JSON'
                  EOF
                  echo "Synced registry auth from cluster pull-secret"
