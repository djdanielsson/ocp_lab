---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: redhat-rhaap-portal-dynamic-plugins-registry-auth
  namespace: aap-portal
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: bitwarden-fields
    kind: ClusterSecretStore
  target:
    name: redhat-rhaap-portal-dynamic-plugins-registry-auth
    deletionPolicy: Delete
    template:
      type: Opaque
      data:
        auth.json: |
          {
            "auths": {
              "registry.redhat.io": {
                "auth": "{{ printf "%s:%s" .registryuser .registrypass | b64enc }}"
              }
            }
          }
  data:
    - secretKey: registryuser
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: ocp-lab/aap-portal
        property: registry-username
    - secretKey: registrypass
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: ocp-lab/aap-portal
        property: registry-password
---
