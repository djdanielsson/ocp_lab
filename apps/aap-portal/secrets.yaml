    - secretKey: openrouterapikey
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: ocp-lab/apme-abbenay
        property: openrouter-api-key
    - secretKey: vertexkey
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: ocp-lab/apme-abbenay
        property: vertex-anthropic-api-key
