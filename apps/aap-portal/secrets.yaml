apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: redhat-rhaap-portal-apme-abbenay-env
  namespace: aap-portal
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: bitwarden-fields
    kind: ClusterSecretStore
  target:
    name: redhat-rhaap-portal-apme-abbenay-env
    deletionPolicy: Delete
    template:
      type: Opaque
      data:
        APME_ABBENAY_TOKEN: "{{ .abbenaytoken }}"
        OPENROUTER_API_KEY: "{{ .openrouterapikey }}"
        VERTEX_ANTHROPIC_API_KEY: "{{ .vertexkey }}"
  data:
