# AAP Portal + APME — lab values override for OCP
# Overrides the upstream ansible-portal-chart defaults.

redhat-developer-hub:
  global:
    clusterRouterBase: apps.ocp.new.lab.danielsson.us.com
    pluginMode: oci
    # Use the official registry.redhat.io OCI plugin image (default for 2.2 chart)
    # ociPluginImage: image-registry.openshift-image-registry.svc:5000/aap-portal/automation-portal
    imageTagInfo: "2.2"
  upstream:
    postgresql:
      auth:
        existingSecret: redhat-rhaap-portal-postgresql-creds
    backstage:
      appConfig:
        app:
          title: "AAP Self-Service Portal"
          baseUrl: https://redhat-rhaap-portal-aap-portal.apps.ocp.new.lab.danielsson.us.com
        backend:
          baseUrl: https://redhat-rhaap-portal-aap-portal.apps.ocp.new.lab.danielsson.us.com
        apme:
          gateway:
            baseUrl: http://redhat-rhaap-portal-apme-gateway:8080
        ansible:
          rhaap:
            checkSSL: false
        auth:
          providers:
            rhaap:
              production:
                checkSSL: false
        catalog:
          providers:
            rhaap:
              '{{- include "catalog.providers.env" . }}':
                orgs: "Default"

# APME engine stack deployed alongside the portal
apme:
  enabled: true
  replicas: 1
  # Use upstream default images from the public chart (no custom internal registry overrides)
  # imagePullPolicy: Always
  abbenay:
    enabled: false
    # image: ghcr.io/redhat-developer/abbenay:latest
  gateway:
    corsOrigins: "*"
    # image: image-registry.openshift-image-registry.svc:5000/apme/apme-gateway:latest
  # primary:
  #   image: image-registry.openshift-image-registry.svc:5000/apme/apme-primary:latest
  # native:
  #   image: image-registry.openshift-image-registry.svc:5000/apme/apme-native:latest
  # opa:
  #   image: image-registry.openshift-image-registry.svc:5000/apme/apme-opa:latest
  # ansible:
  #   image: image-registry.openshift-image-registry.svc:5000/apme/apme-ansible:latest
  gitleaks:
    enabled: true
    # image: image-registry.openshift-image-registry.svc:5000/aap-portal/apme-gitleaks:latest
  collectionHealth:
    enabled: true
    # image: image-registry.openshift-image-registry.svc:5000/aap-portal/apme-collection-health:latest
  depAudit:
    enabled: true
    # image: image-registry.openshift-image-registry.svc:5000/aap-portal/apme-dep-audit:latest
  # galaxyProxy:
  #   image: image-registry.openshift-image-registry.svc:5000/apme/apme-galaxy-proxy:latest
  persistence:
    storageClass: lvms-lvm-local-storage
    sessions:
      size: 5Gi
    gatewayData:
      size: 2Gi
    proxyCache:
      size: 5Gi
