# AAP Portal — lab values override for OCP
# Uses official redhat-rhaap-portal chart v2.2.0 with OCI plugin delivery.
# Plugins are pulled dynamically from registry.redhat.io as OCI artifacts
# at startup — no custom image build or in-cluster plugin registry needed.

redhat-developer-hub:
  global:
    clusterRouterBase: apps.ocp.new.lab.danielsson.us.com
    pluginMode: oci
    imageTagInfo: "2.2"
  upstream:
    postgresql:
      auth:
        existingSecret: redhat-rhaap-portal-postgresql-creds
    backstage:
      appConfig:
        app:
          title: "AAP Self-Service Portal"
          baseUrl: https://redhat-rhaap-portal-aap-portal.apps.ocp.new.lab.danielsson.us.com
        backend:
          baseUrl: https://redhat-rhaap-portal-aap-portal.apps.ocp.new.lab.danielsson.us.com
        ansible:
          rhaap:
            checkSSL: false
        auth:
          providers:
            rhaap:
              production:
                checkSSL: false
        catalog:
          providers:
            rhaap:
              '{{- include "catalog.providers.env" . }}':
                orgs: "Default"

apme:
  enabled: false
