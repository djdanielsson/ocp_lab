# APME values override for OCP lab deployment
# Upstream chart: https://github.com/ansible/apme (deploy/helm/apme)

image:
  registry: image-registry.openshift-image-registry.svc:5000/apme
  tag: latest
  pullPolicy: Always

# Abbenay AI provider
# Token is a placeholder — real credentials are managed by ExternalSecret (apme-prereqs)
# which overwrites the chart-created apme-secrets Secret with values from Vaultwarden.
abbenay:
  enabled: true
  token: "managed-by-external-secrets"

# OpenShift Route (instead of Ingress)
route:
  enabled: true
  host: apme.apps.ocp.new.lab.danielsson.us.com

# Disable Ingress since we use Route
ingress:
  enabled: false

# Use smaller PVCs for lab with local storage
persistence:
  sessions:
    size: 5Gi
    storageClass: lvms-lvm-local-storage
  gateway:
    size: 2Gi
    storageClass: lvms-lvm-local-storage
  proxyCache:
    size: 5Gi
    storageClass: lvms-lvm-local-storage
