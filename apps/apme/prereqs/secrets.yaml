---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: apme-secrets
  namespace: apme
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: bitwarden-fields
    kind: ClusterSecretStore
  target:
    name: apme-secrets
    deletionPolicy: Delete
    template:
      type: Opaque
      data:
        abbenay-token: "{{ .abbenaytoken }}"
        openrouter-api-key: "{{ .openrouterapikey }}"
        vertex-anthropic-api-key: "{{ .vertexkey }}"
  data:
    - secretKey: abbenaytoken
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: ocp-lab/apme-abbenay
        property: abbenay-token
    - secretKey: openrouterapikey
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: ocp-lab/apme-abbenay
        property: openrouter-api-key
    - secretKey: vertexkey
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: ocp-lab/apme-abbenay
        property: vertex-anthropic-api-key
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: apme-abbenay-config
  namespace: apme
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: bitwarden-fields
    kind: ClusterSecretStore
  target:
    name: apme-abbenay-config
    deletionPolicy: Delete
    template:
      type: Opaque
      data:
        config.yaml: "{{ .abbenayconfig }}"
  data:
    - secretKey: abbenayconfig
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: ocp-lab/apme-abbenay
        property: config-yaml
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: apme-gcp-credentials
  namespace: apme
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: bitwarden-fields
    kind: ClusterSecretStore
  target:
    name: apme-gcp-credentials
    deletionPolicy: Delete
    template:
      type: Opaque
      data:
        service-account-key.json: "{{ .gcpsakey }}"
        vertex-project-id: "{{ .gcpprojectid }}"
  data:
    - secretKey: gcpsakey
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: ocp-lab/apme-abbenay
        property: gcp-service-account-key
    - secretKey: gcpprojectid
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: ocp-lab/apme-abbenay
        property: gcp-vertex-project-id
