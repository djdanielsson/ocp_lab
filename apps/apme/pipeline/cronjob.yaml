---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: apme-build-trigger
  namespace: apme
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        spec:
          serviceAccountName: apme-builder
          restartPolicy: Never
          containers:
            - name: trigger
              image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
              command:
                - /bin/bash
                - -c
                - |
                  set -euo pipefail
                  RUN_NAME="apme-build-$(date +%Y%m%d-%H%M%S)"
                  cat <<YAML | oc apply -f -
                  apiVersion: tekton.dev/v1
                  kind: PipelineRun
                  metadata:
                    name: ${RUN_NAME}
                    namespace: apme
                  spec:
                    pipelineRef:
                      name: apme-build
                    taskRunTemplate:
                      serviceAccountName: apme-builder
                    workspaces:
                      - name: source
                        persistentVolumeClaim:
                          claimName: apme-build-workspace
                  YAML
                  echo "Created PipelineRun: ${RUN_NAME}"
