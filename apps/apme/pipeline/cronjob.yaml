---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: apme-build-trigger
  namespace: apme
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        spec:
          serviceAccountName: apme-builder
          restartPolicy: Never
          containers:
            - name: trigger
              image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
              command:
                - /bin/bash
                - -c
                - |
                  set -euo pipefail

                  cleanup_old_runs() {
                    echo "Cleaning up old PipelineRuns..."
                    OLD_RUNS=$(oc get pipelineruns -n apme \
                      -l tekton.dev/pipeline=apme-build \
                      -o jsonpath='{.items[*].metadata.name}' 2>/dev/null || true)
                    for run in $OLD_RUNS; do
                      echo "Deleting old PipelineRun: $run"
                      oc delete pipelinerun "$run" -n apme --ignore-not-found=true 2>/dev/null || true
                    done
                  }

                  cleanup_old_runs

                  RUN_NAME="apme-build-$(date +%Y%m%d-%H%M%S)"
                  cat <<YAML | oc apply -f -
                  apiVersion: tekton.dev/v1
                  kind: PipelineRun
                  metadata:
                    name: ${RUN_NAME}
                    namespace: apme
                    labels:
                      tekton.dev/pipeline: apme-build
                  spec:
                    pipelineRef:
                      name: apme-build
                    taskRunTemplate:
                      serviceAccountName: apme-builder
                    workspaces:
                      - name: source
                        persistentVolumeClaim:
                          claimName: apme-build-workspace
                  YAML
                  echo "Created PipelineRun: ${RUN_NAME}"
