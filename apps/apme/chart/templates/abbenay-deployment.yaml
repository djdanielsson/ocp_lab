{{- if .Values.abbenay.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "apme.fullname" . }}-abbenay
  labels:
    {{- include "apme.labels" . | nindent 4 }}
    app.kubernetes.io/component: abbenay
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "apme.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: abbenay
  template:
    metadata:
      labels:
        {{- include "apme.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: abbenay
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "apme.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: abbenay
          image: {{ .Values.abbenay.image }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          args: ["daemon", "--grpc-host", "0.0.0.0", "--grpc-port", "50057"]
          env:
            - name: APME_ABBENAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "apme.fullname" . }}-secrets
                  key: abbenay-token
            {{- if .Values.abbenay.aiModel }}
            - name: APME_AI_MODEL
              value: {{ .Values.abbenay.aiModel | quote }}
            {{- end }}
            - name: XDG_RUNTIME_DIR
              value: /tmp/abbenay-run
            - name: XDG_CONFIG_HOME
              value: /etc/abbenay-config
            {{- if .Values.abbenay.vertexAnthropic.enabled }}
            {{- if .Values.abbenay.vertexAnthropic.existingGcpSecret }}
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /var/run/secrets/gcp/service-account-key.json
            {{- end }}
            - name: ANTHROPIC_VERTEX_PROJECT_ID
              value: {{ .Values.abbenay.vertexAnthropic.project | quote }}
            - name: GOOGLE_VERTEX_PROJECT_ID
              value: {{ .Values.abbenay.vertexAnthropic.project | quote }}
            - name: CLOUD_ML_REGION
              value: {{ .Values.abbenay.vertexAnthropic.region | quote }}
            - name: GOOGLE_VERTEX_REGION
              value: {{ .Values.abbenay.vertexAnthropic.region | quote }}
            {{- end }}
          ports:
            - name: grpc
              containerPort: 50057
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: 50057
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 50057
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            {{- toYaml .Values.abbenay.resources | nindent 12 }}
          volumeMounts:
            - name: abbenay-config
              mountPath: /etc/abbenay-config/abbenay
              readOnly: true
            {{- if and .Values.abbenay.vertexAnthropic.enabled .Values.abbenay.vertexAnthropic.existingGcpSecret }}
            - name: gcp-credentials
              mountPath: /var/run/secrets/gcp
              readOnly: true
            {{- end }}
      volumes:
        - name: abbenay-config
          secret:
            secretName: {{ include "apme.fullname" . }}-abbenay-config
        {{- if and .Values.abbenay.vertexAnthropic.enabled .Values.abbenay.vertexAnthropic.existingGcpSecret }}
        - name: gcp-credentials
          secret:
            secretName: {{ .Values.abbenay.vertexAnthropic.existingGcpSecret }}
        {{- end }}
{{- end }}
