---
kind: Cluster
apiVersion: postgresql.cnpg.io/v1
metadata:
  name: aap-postgres
spec:
  managed:
    roles:
      - name: aap
        ensure: present
        login: true
      - name: automationgateway
        ensure: present
        login: true
        passwordSecret:
          name: external-postgres-configuration-gateway
      - name: automationhub
        ensure: present
        login: true
        passwordSecret:
          name: external-postgres-configuration-hub
      - name: automationcontroller
        ensure: present
        login: true
        passwordSecret:
          name: external-postgres-configuration-controller
      - name: automationeda
        ensure: present
        passwordSecret:
          name: external-postgres-configuration-eda
        login: true
  instances: 3
  switchoverDelay: 5
  replicationSlots:
    highAvailability:
      enabled: true
  logLevel: info
  primaryUpdateStrategy: unsupervised
  postgresql:
    synchronous:
      method: any
      number: 2
      dataDurability: preferred
  storage:
    size: 100Gi
  walStorage:
    size: 20Gi
