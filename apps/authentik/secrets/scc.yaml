---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: authentik-postgresql-anyuid
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:anyuid
subjects:
  - kind: ServiceAccount
    name: authentik-postgresql
    namespace: authentik
  - kind: ServiceAccount
    name: authentik-server
    namespace: authentik
  - kind: ServiceAccount
    name: authentik-worker
    namespace: authentik
  - kind: ServiceAccount
    name: authentik-redis-master
    namespace: authentik
  - kind: ServiceAccount
    name: default
    namespace: authentik
