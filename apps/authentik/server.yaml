---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentik-server
  namespace: authentik
  labels:
    app: authentik-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: authentik-server
  template:
    metadata:
      labels:
        app: authentik-server
    spec:
      containers:
      - name: server
        image: ghcr.io/goauthentik/server:2026.2.1
        args:
        - server
        env:
        - name: AUTHENTIK_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: authentik-credentials
              key: AUTHENTIK_SECRET_KEY
        - name: AUTHENTIK_BOOTSTRAP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: authentik-credentials
              key: AUTHENTIK_BOOTSTRAP_PASSWORD
        - name: AUTHENTIK_BOOTSTRAP_EMAIL
          value: "admin@danielsson.us.com"
        - name: AUTHENTIK_POSTGRESQL__HOST
          value: "authentik-postgres.authentik.svc.cluster.local"
        - name: AUTHENTIK_POSTGRESQL__PORT
          value: "5432"
        - name: AUTHENTIK_POSTGRESQL__NAME
          valueFrom:
            secretKeyRef:
              name: authentik-postgres-credentials
              key: POSTGRES_DB
        - name: AUTHENTIK_POSTGRESQL__USER
          valueFrom:
            secretKeyRef:
              name: authentik-postgres-credentials
              key: POSTGRES_USER
        - name: AUTHENTIK_POSTGRESQL__PASSWORD
          valueFrom:
            secretKeyRef:
              name: authentik-postgres-credentials
              key: POSTGRES_PASSWORD
        - name: AUTHENTIK_REDIS__HOST
          value: "authentik-redis.authentik.svc.cluster.local"
        ports:
        - name: http
          containerPort: 9000
        - name: https
          containerPort: 9443
        - name: metrics
          containerPort: 9300
        volumeMounts:
        - name: media
          mountPath: /media
        - name: templates
          mountPath: /templates
        resources:
          requests:
            cpu: 50m
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 1Gi
        readinessProbe:
          httpGet:
            path: /-/health/ready/
            port: 9000
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /-/health/live/
            port: 9000
          initialDelaySeconds: 60
          periodSeconds: 30
      volumes:
      - name: media
        emptyDir: {}
      - name: templates
        emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentik-worker
  namespace: authentik
  labels:
    app: authentik-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: authentik-worker
  template:
    metadata:
      labels:
        app: authentik-worker
    spec:
      containers:
      - name: worker
        image: ghcr.io/goauthentik/server:2024.12
        args:
        - worker
        env:
        - name: AUTHENTIK_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: authentik-credentials
              key: AUTHENTIK_SECRET_KEY
        - name: AUTHENTIK_POSTGRESQL__HOST
          value: "authentik-postgres.authentik.svc.cluster.local"
        - name: AUTHENTIK_POSTGRESQL__PORT
          value: "5432"
        - name: AUTHENTIK_POSTGRESQL__NAME
          valueFrom:
            secretKeyRef:
              name: authentik-postgres-credentials
              key: POSTGRES_DB
        - name: AUTHENTIK_POSTGRESQL__USER
          valueFrom:
            secretKeyRef:
              name: authentik-postgres-credentials
              key: POSTGRES_USER
        - name: AUTHENTIK_POSTGRESQL__PASSWORD
          valueFrom:
            secretKeyRef:
              name: authentik-postgres-credentials
              key: POSTGRES_PASSWORD
        - name: AUTHENTIK_REDIS__HOST
          value: "authentik-redis.authentik.svc.cluster.local"
        volumeMounts:
        - name: media
          mountPath: /media
        - name: templates
          mountPath: /templates
        resources:
          requests:
            cpu: 50m
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 1Gi
      volumes:
      - name: media
        emptyDir: {}
      - name: templates
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: authentik-server
  namespace: authentik
  labels:
    app: authentik-server
spec:
  selector:
    app: authentik-server
  ports:
  - name: http
    port: 9000
    targetPort: 9000
  - name: https
    port: 9443
    targetPort: 9443
  - name: metrics
    port: 9300
    targetPort: 9300
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: authentik
  namespace: authentik
spec:
  host: authentik.apps.ocp.new.lab.danielsson.us.com
  to:
    kind: Service
    name: authentik-server
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
