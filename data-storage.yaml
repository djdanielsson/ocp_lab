# https://github.com/igou-io/igou-openshift/blob/main/install/manifests/data-storage.yaml
apiVersion: machineconfiguration.openshift.io/v1
kind: MachineConfig
metadata:
  labels:
    machineconfiguration.openshift.io/role: master
  # this is really root, need to look into if this name matters or if it can be changed
  name: 98-data-partition
spec:
  config:
    ignition:
      version: 3.4.0
    storage:
      disks:
        - device: /dev/nvme0n1
          partitions:
              # this is really root, need to look into if this label matters or if it can be changed
            - label: data
              sizeMiB: 0
              startMiB: 200000
              typeGuid: E6D6D379-F507-44C2-A23C-238F2A3DF928
